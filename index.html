    <script>
        const devName = document.querySelector('.devname');
        const text = devName.textContent;
        devName.textContent = '';

        let i = 0;
        const typingSpeed = 150; // Adjust typing speed

        const cursor = document.createElement('span');
        cursor.textContent = ' \t';
        devName.appendChild(cursor);

        const type = () => {
            if (i < text.length) {
                devName.textContent += text[i];
                i++;
                setTimeout(type, typingSpeed);
            } else {
                // Add a short delay before restarting
                setTimeout(() => {
                    i = 0;
                    devName.textContent = '';
                    setTimeout(type, typingSpeed);
                }, 500);
            }
        };

        // Toggle cursor visibility
        setInterval(() => {
            cursor.style.visibility = cursor.style.visibility === 'hidden' ? 'visible' : 'hidden';
        }, 500);

        type();

        var swiper = new Swiper(".mySwiper", {
            spaceBetween: 30,
            centeredSlides: true,
            autoplay: {
                delay: 2500,
                disableOnInteraction: false,
            },
            pagination: {
                el: ".swiper-pagination",
                clickable: true,
            },
            navigation: {
                nextEl: ".swiper-button-next",
                prevEl: ".swiper-button-prev",
            },
        });
    </script>
